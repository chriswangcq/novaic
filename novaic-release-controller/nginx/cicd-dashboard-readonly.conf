# Include these locations inside the `api.gradievo.com` HTTPS server block.
# They expose only the Release Controller read APIs required by the dashboard.

location = /cicd {
    return 302 /cicd/dashboard;
}

location = /cicd/ {
    return 302 /cicd/dashboard;
}

location = /cicd/dashboard {
    limit_except GET {
        deny all;
    }
    proxy_pass http://127.0.0.1:19880/dashboard;
    proxy_http_version 1.1;
    proxy_set_header Host             $host;
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    add_header Cache-Control "no-store" always;
}

location ~ ^/cicd/v1/(status|runs|rules)$ {
    limit_except GET {
        deny all;
    }
    rewrite ^/cicd/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:19880;
    proxy_http_version 1.1;
    proxy_set_header Host             $host;
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    add_header Cache-Control "no-store" always;
}
