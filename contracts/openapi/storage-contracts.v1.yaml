openapi: 3.1.0
info:
  title: NovAIC Storage Contract Baseline
  version: v1
  description: Round 004 baseline for storage-related contract alignment.
servers:
  - url: http://localhost:8092
paths:
  /internal/storage/artifacts/{artifact_id}:
    get:
      summary: Resolve storage artifact metadata
      operationId: getStorageArtifact
      parameters:
        - in: path
          name: artifact_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact metadata
          content:
            application/json:
              schema:
                $ref: "../schema/storage-artifact.v1.schema.json"
