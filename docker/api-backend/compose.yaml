name: "${COMPOSE_PROJECT_NAME:-novaic-api-backend}"

x-backend-image: &backend_image "${NOVAIC_API_BACKEND_IMAGE:-novaic/api-backend:local}"

x-common-environment: &common_environment
  PYTHONUNBUFFERED: "1"
  NOVAIC_NAMESPACE: "${NOVAIC_NAMESPACE:?NOVAIC_NAMESPACE required}"
  NOVAIC_RELEASE_ID: "${NOVAIC_RELEASE_ID:?NOVAIC_RELEASE_ID required}"
  NOVAIC_HOST_ID: "${NOVAIC_HOST_ID:-api-host-1}"
  NOVAIC_ENVIRONMENT: "${NOVAIC_ENVIRONMENT:?NOVAIC_ENVIRONMENT required}"
  NOVAIC_IMAGE_DIGEST: "${NOVAIC_IMAGE_DIGEST:-}"
  NOVAIC_IMAGE_REF: "${NOVAIC_API_BACKEND_IMAGE:-novaic/api-backend:local}"
  NOVAIC_DATA_DIR: "${NOVAIC_DATA_DIR:?NOVAIC_DATA_DIR required}"
  NOVAIC_SANDBOX_SHARED_DIR: "${NOVAIC_SANDBOX_SHARED_DIR:-}"
  NOVAIC_SERVICE_REGISTRY_URL: "${NOVAIC_SERVICE_REGISTRY_URL:?NOVAIC_SERVICE_REGISTRY_URL required}"
  NOVAIC_BLOB_BACKEND: "${NOVAIC_BLOB_BACKEND:-oss}"
  NOVAIC_OSS_ACCESS_KEY: "${NOVAIC_OSS_ACCESS_KEY:-}"
  NOVAIC_OSS_SECRET_KEY: "${NOVAIC_OSS_SECRET_KEY:-}"
  NOVAIC_OSS_ENDPOINT: "${NOVAIC_OSS_ENDPOINT:-https://oss-cn-hongkong.aliyuncs.com}"
  NOVAIC_OSS_REGION: "${NOVAIC_OSS_REGION:-cn-hongkong}"
  NOVAIC_OSS_BUCKET: "${NOVAIC_OSS_BUCKET:-}"
  AWS_DEFAULT_REGION: "${NOVAIC_OSS_REGION:-cn-hongkong}"

x-common-volumes: &common_volumes
  - ${NOVAIC_DATA_DIR:?NOVAIC_DATA_DIR required}:${NOVAIC_DATA_DIR:?NOVAIC_DATA_DIR required}
  - ${NOVAIC_POSTGRES_SECRETS_DIR:-/opt/novaic/postgres/secrets}:/opt/novaic/postgres/secrets:ro
  - ${NOVAIC_ETC_DIR:-/opt/novaic/etc}:/opt/novaic/etc:ro

x-common-service: &common_service
  image: *backend_image
  init: true
  network_mode: host
  restart: unless-stopped
  environment: *common_environment
  volumes: *common_volumes
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

x-http-healthcheck: &http_healthcheck
  interval: 10s
  timeout: 3s
  retries: 12
  start_period: 20s

services:
  entangled:
    <<: *common_service
    depends_on:
      service-registry:
        condition: service_healthy
    command:
      - -m
      - common.service_runtime
      - --service-registry-url
      - ${NOVAIC_SERVICE_REGISTRY_URL:?NOVAIC_SERVICE_REGISTRY_URL required}
      - --namespace
      - ${NOVAIC_NAMESPACE:?NOVAIC_NAMESPACE required}
      - --release-id
      - ${NOVAIC_RELEASE_ID:?NOVAIC_RELEASE_ID required}
      - --host-id
      - ${NOVAIC_HOST_ID:-api-host-1}
      - --compose-project
      - ${COMPOSE_PROJECT_NAME:-novaic-api-backend}
      - --image-digest
      - ${NOVAIC_IMAGE_DIGEST:-}
      - --image-ref
      - ${NOVAIC_API_BACKEND_IMAGE:-novaic/api-backend:local}
      - --environment
      - ${NOVAIC_ENVIRONMENT:?NOVAIC_ENVIRONMENT required}
      - --service-name
      - entangled_service
      - --instance-id
      - ${NOVAIC_HOST_ID:-api-host-1}-entangled
      - --advertise-url
      - http://127.0.0.1:${NOVAIC_ENTANGLED_PORT:?NOVAIC_ENTANGLED_PORT required}
      - --health-path
      - /v1/health
      - --compose-service
      - entangled
      - --
      - -m
      - entangled.app.main
      - --host
      - "127.0.0.1"
      - --port
      - "${NOVAIC_ENTANGLED_PORT:?NOVAIC_ENTANGLED_PORT required}"
      - --postgres-dsn-file
      - /opt/novaic/postgres/secrets/novaic_entangled_dsn
      - --service-token-file
      - ${NOVAIC_ENTANGLED_SERVICE_TOKEN_FILE:?NOVAIC_ENTANGLED_SERVICE_TOKEN_FILE required}
      - --log-level
      - info
    healthcheck:
      <<: *http_healthcheck
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${NOVAIC_ENTANGLED_PORT:?NOVAIC_ENTANGLED_PORT required}/v1/health >/dev/null"]

  queue-service:
    <<: *common_service
    depends_on:
      service-registry:
        condition: service_healthy
    command:
      - -m
      - common.service_runtime
