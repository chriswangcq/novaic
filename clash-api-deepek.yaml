# 可直接在 Clash Verge：配置 / 新建配置 / 导入 本文件
# 与 api.deepek.com 上 v2ray VMess+WS+TLS 一致

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

proxies:
  - name: "api-deepek-vmess"
    type: vmess
    server: api.deepek.com
    port: 443
    uuid: fcc5a374-eb6a-49da-aedc-7c3d8c2d3420
    alterId: 0
    cipher: auto
    skip-cert-verify: false
    network: ws
    tls: true
    servername: api.deepek.com
    ws-opts:
      path: /api/ws
      headers:
        Host: api.deepek.com

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - api-deepek-vmess
      - DIRECT

rules:
  - MATCH, PROXY
