# cnd.gradievo.com — 前端静态资源（路径 /resource/frontend/v{version}/）
#
# 部署: 将 novaic-app/dist/ 内容放到 /opt/novaic/static/v{version}/
# URL: https://cnd.gradievo.com/resource/frontend/v0.3.0/

# HTTP → HTTPS
server {
    listen 80;
    server_name cnd.gradievo.com;
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cnd.gradievo.com;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # /resource/frontend/v0.3.0/ → /opt/novaic/static/v0.3.0/
    location /resource/frontend/ {
        alias /opt/novaic/static/;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /resource/frontend {
        return 302 /resource/frontend/;
    }
    location = /resource/frontend/ {
        return 302 /resource/frontend/v0.3.0/;
    }
}
