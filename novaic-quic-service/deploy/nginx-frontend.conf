# frontend.gradievo.com — 前端静态资源（与 relay 同机部署）
#
# 部署步骤：
#   1. 申请证书: ssh root@relay.gradievo.com "bash -s relay.gradievo.com stun.gradievo.com frontend.gradievo.com" < novaic-quic-service/deploy/setup-certbot.sh
#   2. 安装 nginx（若未安装）: apt install -y nginx
#   3. 复制并替换占位符:
#        sed -e 's|/path/to/cert|/etc/letsencrypt/live/relay.gradievo.com/fullchain.pem|g' \
#            -e 's|/path/to/key|/etc/letsencrypt/live/relay.gradievo.com/privkey.pem|g' \
#            deploy/nginx-frontend.conf > /tmp/nginx-frontend.conf
#   4. sudo cp /tmp/nginx-frontend.conf /etc/nginx/sites-available/frontend
#   5. sudo ln -sf /etc/nginx/sites-available/frontend /etc/nginx/sites-enabled/
#   6. sudo mkdir -p /opt/novaic/static
#   7. sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS
server {
    listen 80;
    server_name frontend.gradievo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name frontend.gradievo.com;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/novaic/static;
    index index.html;
    # 版本化路径: /v0.3.0/index.html, /v0.3.0/assets/...
    # 部署: 将 novaic-app/dist/ 内容放到 /opt/novaic/static/v{version}/
    # 根路径重定向到默认版本（部署新版本时可更新此路径）
    location = / {
        return 302 /v0.3.0/;
    }
    location / {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri $uri/ =404;
    }
}
