name: Python Service Template

on:
  workflow_call:
    inputs:
      service_path:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.11"
      test_command:
        required: false
        type: string
        default: "pytest -q"

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install baseline tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint
        run: ruff check "${{ inputs.service_path }}"

      - name: Test
        working-directory: ${{ inputs.service_path }}
        run: ${{ inputs.test_command }}
