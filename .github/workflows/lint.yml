name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-dispatch:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install ripgrep
      run: sudo apt-get update && sudo apt-get install -y ripgrep
    - name: Run dispatch lint
      run: ./scripts/ci/lint_dispatch.sh
    - name: Run httpx lint
      run: ./scripts/ci/lint_httpx.sh
    - name: Run internal-async guard (PR-34 34e)
      run: python3 scripts/ci/check_no_internal_async.py
    - name: Run lifecycle lint (PR-21)
      run: ./scripts/ci/lint_lifecycle.sh
    - name: Run subagent-status lint (PR-28)
      run: ./scripts/ci/lint_subagent_status.sh
    - name: Run scope-phase lint (PR-29)
      run: ./scripts/ci/lint_scope_phase.sh
    - name: Run retired-message-columns lint
      run: ./scripts/ci/lint_retired_message_columns.sh
    - name: Run chat_messages.read UI-only lint (P6-12 / R10)
      run: ./scripts/ci/lint_chat_messages_read.sh
    - name: Run wake-continuity contract lint (PR-45.2 / R9)
      run: ./scripts/ci/lint_wake_continuity_contract.sh
    - name: Run Cortex boundary lint (PR-76)
      run: ./scripts/ci/lint_cortex_boundary.sh
    - name: Run Blob workspace boundary lint
      run: python3 scripts/ci/lint_blob_workspace_boundary.py
    - name: Run retired-service residue lint (PR-140)
      run: ./scripts/ci/lint_retired_service_residue.sh
    - name: Run frontend phantom-tool lint (PR-142)
      run: ./scripts/ci/lint_frontend_phantom_tools.sh
    - name: Run agent-loop path lint (PR-143)
      run: ./scripts/ci/lint_agent_loop_path.sh
    - name: Run Entangled schema SSOT lint (PR-145)
      run: ./scripts/ci/lint_entangled_schema_ssot.sh
    - name: Run current docs residue lint (PR-146)
      run: ./scripts/ci/lint_current_docs_residue.sh
    - name: Run roadmap ticket archaeology lint (PR-210)
      run: python3 scripts/ci/lint_roadmap_ticket_archaeology.py
    - name: Run docs status consistency lint
      run: python3 scripts/ci/lint_docs_status_consistency.py
    - name: Run deploy fresh-smoke lint
      run: python3 scripts/ci/lint_deploy_fresh_smoke.py
    - name: Run image namespace deploy lint
      run: python3 scripts/ci/lint_image_namespace_deploy.py
    - name: Run immutable image workflow lint
      run: python3 scripts/ci/lint_immutable_image_workflows.py
    - name: Run namespace platform docs lint
      run: python3 scripts/ci/lint_namespace_platform_docs.py
    - name: Run API backend Compose path lint
      run: python3 scripts/ci/lint_api_backend_compose_path.py
    - name: Run API backend namespace Compose lint
      run: python3 scripts/ci/lint_api_backend_namespace_compose.py
    - name: Run host-infra Compose path lint
      run: python3 scripts/ci/lint_host_infra_compose_path.py
    - name: Run LLM Factory Docker path lint
      run: python3 scripts/ci/lint_llm_factory_docker_path.py
    - name: Run LLM Factory namespace Compose lint
      run: python3 scripts/ci/lint_llm_factory_namespace_compose.py
    - name: Run release-controller CI guard
      run: python3 -m pytest -q scripts/ci/test_release_controller_ci.py
    - name: Run service config secret-split lint
      run: python3 scripts/ci/lint_service_config_secret_split.py
    - name: Run service catalog/discovery lint
      run: python3 scripts/ci/lint_service_catalog_discovery.py
    - name: Run namespace registry/runtime lint
      run: python3 scripts/ci/lint_namespace_registry_runtime.py
    - name: Run runtime worker supervision lint
      run: python3 scripts/ci/lint_runtime_worker_supervision.py
    - name: Run retired runtime vocabulary lint
      run: python3 scripts/ci/lint_retired_runtime_vocabulary.py
    - name: Run start/config contract lint (PR-156)
      run: python3 scripts/ci/check_start_config_contract.py
    - name: Run agent main-path acceptance lint (PR-186 / PR-187)
      run: ./scripts/ci/lint_agent_main_path_acceptance.sh
    - name: Run retired agent paths lint (PR-187)
      run: ./scripts/ci/lint_retired_agent_paths.sh
    - name: Run lifecycle loop ownership lint (PR-187)
      run: ./scripts/ci/lint_lifecycle_loop_ownership.sh
    - name: Run generated artifact lint
      run: ./scripts/ci/lint_generated_artifacts.sh
    - name: Run retired file and SQLite residue lint
      run: python3 scripts/ci/test_no_legacy_file_hot_paths.py
