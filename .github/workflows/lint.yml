name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-dispatch:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install ripgrep
      run: sudo apt-get update && sudo apt-get install -y ripgrep
    - name: Run dispatch lint
      run: ./scripts/ci/lint_dispatch.sh
