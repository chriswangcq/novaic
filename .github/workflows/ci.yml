name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # Frontend (React + TypeScript)
  # ============================================================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: novaic-app/package-lock.json

      - name: Install dependencies
        working-directory: novaic-app
        run: npm ci

      - name: Type check
        working-directory: novaic-app
        run: npx tsc --noEmit

      - name: Build
        working-directory: novaic-app
        run: npm run build

  # ============================================================
  # Tauri (Rust)
  # ============================================================
  tauri:
    name: Tauri Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri 在 Linux 上需要这些系统依赖
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: novaic-app/src-tauri

      - name: Check Rust code
        working-directory: novaic-app/src-tauri
        run: cargo check

      - name: Clippy lint
        working-directory: novaic-app/src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true  # 暂时不强制要求

  # ============================================================
  # Python (novaic-mcp-vmuse, novaic-agent, novaic-cloud)
  # ============================================================
  python:
    name: Python Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # 语法检查
      - name: Syntax check (novaic-agent)
        run: python -m py_compile novaic-agent/main.py novaic-agent/config.py

      - name: Syntax check (novaic-cloud)
        run: python -m py_compile novaic-cloud/main.py novaic-cloud/config.py

      - name: Syntax check (novaic-mcp-vmuse)
        run: |
          python -m py_compile novaic-mcp-vmuse/src/novaic_mcp_vmuse/main.py
          python -m py_compile novaic-mcp-vmuse/src/novaic_mcp_vmuse/cli.py
          python -m py_compile novaic-mcp-vmuse/src/novaic_mcp_vmuse/config.py

      # Ruff lint (快速的 Python linter)
      - name: Lint with Ruff
        run: |
          ruff check novaic-agent/ --select=E,F --ignore=E501 || true
          ruff check novaic-cloud/ --select=E,F --ignore=E501 || true
          ruff check novaic-mcp-vmuse/src/ --select=E,F --ignore=E501 || true
        continue-on-error: true  # 暂时不强制要求

  # ============================================================
  # 汇总检查结果
  # ============================================================
  ci-success:
    name: CI Success
    needs: [frontend, tauri, python]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.tauri.result }}" == "failure" ]] || \
             [[ "${{ needs.python.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
