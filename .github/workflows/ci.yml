name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/novaic-app/package-lock.json

      - name: Frontend build
        working-directory: packages/novaic-app
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Tauri (Rust) check
        working-directory: packages/novaic-app/src-tauri
        run: cargo check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          python -m py_compile packages/novaic-agent/main.py packages/novaic-cloud/main.py
          python -m compileall packages/novaic-agent packages/novaic-cloud packages/novaic-core
