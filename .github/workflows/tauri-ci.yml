name: Tauri CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  desktop-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: novaic-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: cd novaic-app && npm ci

      - name: OTA config sync check
        run: bash scripts/check-ota-sync.sh

      - name: Cargo check (desktop)
        run: cd novaic-app/src-tauri && cargo check -p novaic --features desktop

      - name: Cargo test
        run: cd novaic-app/src-tauri && cargo test
