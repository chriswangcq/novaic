name: Tauri CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  desktop-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: novaic-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend deps
        run: cd novaic-app && npm ci

      - name: Typecheck (novaic-app)
        run: cd novaic-app && npx tsc --noEmit

      - name: Vitest unit tests (e.g. deriveDesiredMainNav)
        run: cd novaic-app && npm run test:unit

      - name: ESLint (novaic-app)
        run: cd novaic-app && npm run lint

      - name: OTA config sync check
        run: bash scripts/check-ota-sync.sh

      - name: Entity idField JSON sync (Gateway / Rust / App)
        run: |
          cmp novaic-gateway/gateway/entity/generated_entity_id_fields.json Entangled/packages/client-rust/entity_id_fields.json
          cmp novaic-gateway/gateway/entity/generated_entity_id_fields.json novaic-app/src/data/entangled/generated_entity_id_fields.json

      - name: Entity TS interfaces codegen check
        run: python3 scripts/generate_entity_types.py --check

      - name: Entity store getId vs idField JSON
        run: python3 scripts/check_entity_store_pk.py

      - name: Gateway Sync Contract (schema + version parity)
        run: |
          python3 -m pip install -q -r novaic-gateway/requirements.txt
          cd novaic-gateway && python3 -m unittest tests.unit.gateway.test_sync_contract_schema -v

      - name: Cargo check (desktop)
        run: cd novaic-app/src-tauri && cargo check -p novaic --features desktop

      - name: Cargo test
        run: cd novaic-app/src-tauri && cargo test
