name: Tauri CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  desktop-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: novaic-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend deps
        run: cd novaic-app && npm ci

      - name: Typecheck (novaic-app)
        run: cd novaic-app && npx tsc --noEmit

      - name: Vitest unit tests (e.g. deriveDesiredMainNav)
        run: cd novaic-app && npm run test:unit

      - name: ESLint (novaic-app)
        run: cd novaic-app && npm run lint

      - name: OTA config sync check
        run: bash scripts/check-ota-sync.sh

      - name: Entangled schema SSOT guard
        run: bash scripts/ci/lint_entangled_schema_ssot.sh

      - name: Gateway unit tests (sync contract + remote notify)
        run: |
          python3 -m pip install -q -r novaic-gateway/requirements.txt
          cd novaic-gateway && python3 -m unittest tests.unit.gateway.test_sync_contract_schema tests.unit.gateway.test_remote_notify -v

      - name: Entangled server-python import smoke
        run: cd Entangled/packages/server-python && python3 -c "from entangled.app import ws, crud; print('entangled app ok')"

      - name: Cargo check (desktop)
        run: cd novaic-app/src-tauri && cargo check -p novaic --features desktop

      - name: Cargo test
        run: cd novaic-app/src-tauri && cargo test
